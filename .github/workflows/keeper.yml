name: Vortex keeper — hedge + settled-redeem

# Unattended keeper (idea-bank #8): every 30 min it (1) redeems any settled hedge
# positions — sweeping the payout back into the vault — then (2) mints a fresh small
# OTM crash hedge when the vault has idle dUSDC (skips safely if idle is too low).
# Keeper keys live in repo Secrets — never in the frontend.
#
# Required repo secret:  DEPLOYER_MNEMONIC  (keeper wallet that owns the PredictManager)
# Optional repo secret:  STRATEGIST_SK      (defaults to the dev strategist key in keeper.mts)

on:
  schedule:
    - cron: "*/30 * * * *"      # every 30 minutes (UTC)
  workflow_dispatch: {}          # allow manual runs from the Actions tab

concurrency:
  group: vortex-keeper
  cancel-in-progress: false

jobs:
  redeem:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vortex-interface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Redeem settled + mint fresh hedge
        env:
          DEPLOYER_MNEMONIC: ${{ secrets.DEPLOYER_MNEMONIC }}
          STRATEGIST_SK: ${{ secrets.STRATEGIST_SK }}
        run: |
          npx tsx scripts/keeper.mts status
          npx tsx scripts/keeper.mts redeem-settled
          npx tsx scripts/keeper.mts hedge 0.5 0.5 0.1
